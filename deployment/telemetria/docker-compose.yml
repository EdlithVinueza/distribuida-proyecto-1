name: telemetria

networks:
  telemetria-net:
    driver: bridge

services:
  db-server:
    image: postgres:17.10-alpine3.24
    networks:
      - telemetria-net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: labcom,2015
      POSTGRES_DB: books20262026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  consul:
    image: hashicorp/consul:1.20
    networks:
      - telemetria-net
    command: agent -server -bootstrap -ui -node=consul -client=0.0.0.0
    ports:
      - 8500:8500
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    networks:
      - telemetria-net
    volumes:
      - ./configs:/etc/prometheus
    ports:
      - 9090:9090
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
     - 3000:3000
    networks:
     - telemetria-net

  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    networks:
      - telemetria-net
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8070:8080
    expose:
      - 8080
    restart: unless-stopped
    depends_on:
      - db-server
      - consul

  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    networks:
      - telemetria-net
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books20262026
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: labcom,2015
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8071:8080
    expose:
      - 8080
    restart: unless-stopped
    depends_on:
      - db-server
      - consul

  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customers-app
    networks:
      - telemetria-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-server:5432/books20262026
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: labcom,2015
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SERVER_PORT: "8090"
    ports:
      - 8091:8090
    restart: unless-stopped
    depends_on:
      - db-server
      - consul

  proxy:
    image: traefik:3.7.5
    networks:
      - telemetria-net
    depends_on:
      - consul
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--entryPoints.http.address=:80"
      - "--entryPoints.traefik.address=:8080"
      - "--entryPoints.metrics.address=:8082"
      - "--providers.consulCatalog"
      - "--providers.consulCatalog.endpoint.address=consul:8500"
      - "--providers.consulCatalog.exposedByDefault=false"
      - "--providers.consulCatalog.refreshInterval=5s"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
    ports:
      - 8888:8080
      - 8080:80
      - 8082:8082

  postgresql-exporter:
    image: prometheuscommunity/postgres-exporter
    networks:
      - telemetria-net
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:labcom,2015@db-server:5432/books20262026?sslmode=disable"
    ports:
      - 9187:9187

volumes:
  postgres_data: {}
