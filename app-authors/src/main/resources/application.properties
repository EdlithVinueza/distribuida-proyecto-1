quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/books20262026
quarkus.datasource.username=postgres
quarkus.datasource.password=labcom,2015

quarkus.http.port=8070
quarkus.http.host=0.0.0.0

# Run Flyway migrations automatically
quarkus.flyway.migrate-at-start=true

#quarkus.package.jar.type=uber-jar


#--CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.* /
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=X-Requested-With,Content-Type,Accept,Origin,Authorization

#-- OpenTelemetry Tracing
quarkus.otel.enabled=true
quarkus.otel.service.name=app-authors
quarkus.otel.traces.sampler=always_on
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
# Se puede registrar también la integración con la base de datos (Hibernate ORM) para trazabilidad completa
quarkus.datasource.jdbc.telemetry=true

#--Health
quarkus.smallrye-health.enabled=true